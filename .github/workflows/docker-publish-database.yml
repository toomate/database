name: Build, validate and publish Docker image (database)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-db-init:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for validation
        run: docker build -t toomate-database:ci -f ./Dockerfile .

      - name: Start MySQL container from built image
        run: |
          docker run -d --name toomate_mysql_ci \
            -e MYSQL_ROOT_PASSWORD=root \
            -p 3307:3306 \
            toomate-database:ci

      - name: Wait for MySQL to become ready
        run: |
          for i in {1..60}; do
            if docker exec toomate_mysql_ci mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Validate schema and required tables
        run: |
          DB_EXISTS=$(docker exec toomate_mysql_ci mysql -uroot -proot -Nse "SELECT COUNT(*) FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME='toomate';")
          echo "Database exists count: $DB_EXISTS"
          if [ "$DB_EXISTS" -ne 1 ]; then
            echo "Database 'toomate' was not created"
            exit 1
          fi

          TABLE_COUNT=$(docker exec toomate_mysql_ci mysql -uroot -proot -Nse "SELECT COUNT(*) FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA='toomate' AND TABLE_TYPE='BASE TABLE';")
          echo "Base table count: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -lt 1 ]; then
            echo "No tables found in database 'toomate'"
            exit 1
          fi

          REQUIRED_TABLES=(Usuario categoria insumo fornecedor marca lote cliente divida boleto)
          for table in "${REQUIRED_TABLES[@]}"; do
            EXISTS=$(docker exec toomate_mysql_ci mysql -uroot -proot -Nse "SELECT COUNT(*) FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA='toomate' AND TABLE_NAME='${table}';")
            if [ "$EXISTS" -ne 1 ]; then
              echo "Required table '${table}' was not created"
              exit 1
            fi
          done

          echo "Database and required tables were created successfully"

      - name: Cleanup container
        if: always()
        run: docker rm -f toomate_mysql_ci || true

  docker:
    needs: validate-db-init
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (lucaspaessptech/toomate:database)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: lucaspaessptech/toomate:database
          cache-from: type=gha
          cache-to: type=gha,mode=max
